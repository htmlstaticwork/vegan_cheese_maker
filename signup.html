<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cheevo | Sign Up</title>
  <link rel="stylesheet" href="style.css">

</head>
<body class="auth-page">

  <div class="auth-card fade-in">
    <div style="text-align:center;">
      <a href="index.html" class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg> Cheevo
      </a>
    </div>
    
    <h2 class="text-center mb-1" style="font-family:var(--font-heading); font-size:1.8rem;">Join the Club</h2>
    <p class="text-center mb-4" style="opacity:0.8; font-size:0.9rem;">Create your account to start your tasting journey.</p>

    <form action="dashboard.html">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" placeholder="David M." required>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" placeholder="connoisseur@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-input-wrap">
          <input type="password" class="form-input" placeholder="••••••••" required>
          <button type="button" class="password-toggle"><i data-lucide="eye"></i></button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="password-input-wrap">
          <input type="password" class="form-input" placeholder="••••••••" required>
          <button type="button" class="password-toggle"><i data-lucide="eye"></i></button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary mb-3 text-center" style="width:100%;">Create Account</button>
    </form>

    <div style="text-align:center; position:relative; margin: 1.5rem 0;">
      <hr style="border:0; border-top:1px solid var(--border-color);">
      <span style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:var(--card-bg); padding:0 1rem; color:var(--text-color); font-size:0.8rem; opacity:0.7;">OR</span>
    </div>

    <div class="social-login">
      <button class="btn-social">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="btn-social">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.05 2.26.45 3.09.45.81 0 2.23-.58 3.84-.4 1.55.08 2.72.69 3.35 1.7-3.18 1.9-2.58 5.98.53 7.07-.67 1.67-1.48 3.12-2.81 4.15M12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.02 4.41-3.74 4.25"></path></svg>
        Apple
      </button>
    </div>

    <p class="text-center" style="margin-top:2rem; font-size:0.9rem;">
      Already have an account? <a href="login.html" style="color:var(--primary-color); font-weight:600;">Sign in</a>
    </p>

    <!-- Essential Toggles -->
    <div style="display:flex; justify-content:center; gap:1rem; margin-top:2rem;">
      <button class="icon-btn" id="theme-toggle" style="background:var(--input-bg); border:1px solid var(--border-color);"><i data-lucide="moon" style="width:16px; height:16px;"></i></button>
      <button class="icon-btn" id="rtl-toggle" style="background:var(--input-bg); border:1px solid var(--border-color);"><i data-lucide="align-right" style="width:16px; height:16px;"></i></button>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="script.js"></script>
</body>
</html>
